                                <div class="code-body"><pre><code class="language-javascript">// Simple todo list (conceptual)
let todos = [];

function addTodo(task) {

function render() {

    list.innerHTML = '';
    todos.forEach((todo, index) => {
        let li = document.createElement('li');

        list.appendChild(li);
    });

    render();

// Example: addTodo("Learn JavaScript");</code></pre></div>

        // ========== GLOBAL STATE ==========
        let currentLevel = 0;
        let currentLesson = 0;   // index inside level

        // flatten lessons for easy prev/next
        function getFlatIndex() {
            let flat = 0;
            for (let l = 0; l < currentLevel; l++) flat += course[l].lessons.length;
            return flat + currentLesson;
        }
        function totalLessons() {
            return course.reduce((acc, lvl) => acc + lvl.lessons.length, 0);
        }

        // ========== RENDER SIDEBAR ==========
        function renderSidebar() {
            const container = document.getElementById('levelList');
            container.innerHTML = '';
            course.forEach((lvl, lIdx) => {
                const levelDiv = document.createElement('div');
                levelDiv.className = `level-card ${lIdx === currentLevel ? 'active-level' : ''}`;
                levelDiv.innerHTML = `
                    <div class="level-header">
                        <i class="fas ${lvl.icon}"></i>
                        <span class="level-title">Level ${lIdx+1}: ${lvl.name}</span>
                    </div>
                    <ul class="module-list" id="level-${lIdx}">
                        ${lvl.lessons.map((les, mIdx) => `
                            <li class="module-item ${lIdx === currentLevel && mIdx === currentLesson ? 'active-module' : ''}" data-level="${lIdx}" data-lesson="${mIdx}">
                                <span class="module-badge">${mIdx+1}</span> ${les.title}
                            </li>
                        `).join('')}
                    </ul>
                `;
                container.appendChild(levelDiv);
            });

            // attach listeners to module items
            document.querySelectorAll('.module-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    const l = parseInt(item.dataset.level);
                    const les = parseInt(item.dataset.lesson);
                    goToLesson(l, les);
                });
            });
        }

        // ========== RENDER LESSON CONTAINERS ==========
        function renderLessons() {
            const holder = document.getElementById('lessonContainers');
            holder.innerHTML = '';
            course.forEach((lvl, lIdx) => {
                lvl.lessons.forEach((les, mIdx) => {
                    const div = document.createElement('div');
                    div.className = `lesson-container ${lIdx === currentLevel && mIdx === currentLesson ? 'active-lesson' : ''}`;
                    div.id = `lesson-${lIdx}-${mIdx}`;
                    div.innerHTML = `
                        <h1 class="lesson-title">${les.title}</h1>
                        <p style="color: var(--gray); margin-bottom: 20px;">${les.desc}</p>
                        ${les.content}
                    `;
                    holder.appendChild(div);
                });
            });
        }

        // ========== UPDATE UI (active classes, breadcrumb, buttons, progress) ==========
        function updateUI() {
            // sidebar active classes
            document.querySelectorAll('.level-card').forEach((el, idx) => {
                if (idx === currentLevel) el.classList.add('active-level');
                else el.classList.remove('active-level');
            });
            document.querySelectorAll('.module-item').forEach(el => {
                el.classList.remove('active-module');
            });
            const activeModule = document.querySelector(`.module-item[data-level="${currentLevel}"][data-lesson="${currentLesson}"]`);
            if (activeModule) activeModule.classList.add('active-module');

            // lesson containers visibility
            document.querySelectorAll('.lesson-container').forEach((el, idx) => {
                const [l, les] = el.id.replace('lesson-','').split('-').map(Number);
                if (l === currentLevel && les === currentLesson) {
                    el.classList.add('active-lesson');
                } else {
                    el.classList.remove('active-lesson');
                }
            });

            // breadcrumb
            document.getElementById('currentLevelName').innerText = `Level ${currentLevel+1}: ${course[currentLevel].name}`;
            document.getElementById('currentModuleName').innerText = course[currentLevel].lessons[currentLesson].title;

            // prev/next buttons
            const flat = getFlatIndex();
            const total = totalLessons();
            document.getElementById('prevBtn').disabled = (flat === 0);
            document.getElementById('nextBtn').disabled = (flat === total-1);

            // progress
            const percent = Math.round(((flat+1)/total)*100);
            document.getElementById('progressPercent').innerText = percent+'%';
            document.getElementById('progressFill').style.width = percent+'%';
        }

        function goToLesson(levelIdx, lessonIdx) {
            if (levelIdx < 0 || levelIdx >= course.length) return;
            if (lessonIdx < 0 || lessonIdx >= course[levelIdx].lessons.length) return;
            currentLevel = levelIdx;
            currentLesson = lessonIdx;
            updateUI();
            window.scrollTo(0,0);
        }

        function nextLesson() {
            const flat = getFlatIndex();
            const total = totalLessons();
            if (flat < total-1) {
                // find next
                if (currentLesson + 1 < course[currentLevel].lessons.length) {
                    goToLesson(currentLevel, currentLesson + 1);
                } else {
                    goToLesson(currentLevel + 1, 0);
                }
            }
        }

        function prevLesson() {
            if (getFlatIndex() > 0) {
                if (currentLesson > 0) {
                    goToLesson(currentLevel, currentLesson - 1);
                } else {
                    goToLesson(currentLevel - 1, course[currentLevel-1].lessons.length - 1);
                }
            }
        }

        // ========== COPY BUTTON FUNCTIONALITY ==========
        function setupCopyButtons() {
            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.removeEventListener('click', copyHandler);
                btn.addEventListener('click', copyHandler);
            });
        }

        function copyHandler(e) {
            const btn = e.currentTarget;
            const block = btn.closest('.code-block');
            const codeElement = block.querySelector('code');
            const text = codeElement.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const original = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                setTimeout(() => { btn.innerHTML = original; }, 1500);
            }).catch(() => {
                alert('Failed to copy');
            });
        }

        // ========== INIT ==========
        window.addEventListener('DOMContentLoaded', () => {
            renderSidebar();
            renderLessons();
            updateUI();
            setupCopyButtons();

            // listeners for nav buttons
            document.getElementById('prevBtn').addEventListener('click', prevLesson);
            document.getElementById('nextBtn').addEventListener('click', nextLesson);

            // floating buttons (no functionality)
            document.getElementById('askAi').addEventListener('click', () => alert('Ask Skillmynte AI — demo'));
            document.getElementById('codeEditor').addEventListener('click', () => alert('Code Editor — demo'));

            // re-attach copy after any navigation (since new containers might be added)
            const observer = new MutationObserver(() => setupCopyButtons());
            observer.observe(document.getElementById('lessonContainers'), { childList: true, subtree: true });
        });
    </script>
